<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain API — Admin</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #0f172a; color: #e2e8f0; }
  h1 { font-size: 20px; }
  label { display: block; margin-top: 14px; font-size: 13px; color: #94a3b8; }
  input, textarea { width: 100%; padding: 8px; margin-top: 4px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-family: inherit; box-sizing: border-box; }
  textarea { min-height: 90px; font-family: monospace; font-size: 13px; }
  button { margin-top: 20px; padding: 10px 18px; background: #2563eb; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  #status { margin-top: 14px; padding: 10px; border-radius: 6px; display: none; }
  .ok { background: #14532d; color: #bbf7d0; }
  .err { background: #7f1d1d; color: #fecaca; }
  #list { margin-top: 40px; }
  .entry { background: #1e293b; padding: 10px 14px; border-radius: 6px; margin-top: 8px; font-size: 13px; }
  .entry b { color: #60a5fa; }
  .tabs { display: flex; gap: 8px; margin-top: 14px; }
  .tabs button { margin-top: 0; background: #334155; }
  .tabs button.active { background: #2563eb; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Add / Update Domain Entry</h1>

<div class="tabs">
  <button type="button" id="tabForm" class="active">Form</button>
  <button type="button" id="tabJson">Paste JSON</button>
</div>

<div id="formMode">
  <label>Admin Key</label>
  <input id="adminKey" type="password" placeholder="Your ADMIN_SECRET">

  <label>ID (e.g. gyanbindu, 8768, PHU8)</label>
  <input id="f_id">

  <label>Domain</label>
  <input id="f_domain">

  <label>Name</label>
  <input id="f_name">

  <label>Stylish Name (brand)</label>
  <input id="f_stylish">

  <label>Image URL</label>
  <input id="f_image">

  <label>Token</label>
  <input id="f_token">

  <label>Course ID</label>
  <input id="f_courseid" type="number" value="0">

  <label>Player URL</label>
  <input id="f_player">

  <label>PDF View API</label>
  <input id="f_pdfview">

  <label>PDF Download API</label>
  <input id="f_pdfdow">

  <button id="submitForm">Add / Update Entry</button>
</div>

<div id="jsonMode" class="hidden">
  <label>Admin Key</label>
  <input id="adminKey2" type="password" placeholder="Your ADMIN_SECRET">

  <label>Paste JSON (single entry)</label>
  <textarea id="jsonInput" placeholder='{"id":"8768","domain":"...","name":"...","stylishName(brand)":"...","courseid":184,"pdf_view_api":"...","pdf_dow_api":"..."}'></textarea>

  <button id="submitJson">Add / Update Entry</button>
</div>

<div id="status"></div>

<div id="list">
  <h1>Stored Entries</h1>
  <div id="entries">Loading…</div>
</div>

<script>
const tabForm = document.getElementById('tabForm');
const tabJson = document.getElementById('tabJson');
const formMode = document.getElementById('formMode');
const jsonMode = document.getElementById('jsonMode');

tabForm.onclick = () => {
  tabForm.classList.add('active'); tabJson.classList.remove('active');
  formMode.classList.remove('hidden'); jsonMode.classList.add('hidden');
};
tabJson.onclick = () => {
  tabJson.classList.add('active'); tabForm.classList.remove('active');
  jsonMode.classList.remove('hidden'); formMode.classList.add('hidden');
};

function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.className = ok ? 'ok' : 'err';
}

async function submitEntry(entry, key) {
  try {
    const resp = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': key },
      body: JSON.stringify(entry)
    });
    const data = await resp.json();
    if (!resp.ok) {
      showStatus('Error: ' + (data.error || resp.status), false);
      return;
    }
    showStatus('Saved: ' + entry.id, true);
    loadList();
  } catch (err) {
    showStatus('Request failed: ' + err.message, false);
  }
}

document.getElementById('submitForm').onclick = () => {
  const entry = {
    id: document.getElementById('f_id').value.trim(),
    domain: document.getElementById('f_domain').value.trim(),
    name: document.getElementById('f_name').value.trim(),
    "stylishName(brand)": document.getElementById('f_stylish').value.trim(),
    image: document.getElementById('f_image').value.trim(),
    token: document.getElementById('f_token').value.trim(),
    courseid: Number(document.getElementById('f_courseid').value) || 0,
    player_url: document.getElementById('f_player').value.trim(),
    pdf_view_api: document.getElementById('f_pdfview').value.trim(),
    pdf_dow_api: document.getElementById('f_pdfdow').value.trim(),
  };
  if (!entry.id) { showStatus('ID is required', false); return; }
  submitEntry(entry, document.getElementById('adminKey').value);
};

document.getElementById('submitJson').onclick = () => {
  let entry;
  try {
    entry = JSON.parse(document.getElementById('jsonInput').value);
  } catch (err) {
    showStatus('Invalid JSON: ' + err.message, false);
    return;
  }
  if (!entry.id) { showStatus('JSON must include an "id" field', false); return; }
  submitEntry(entry, document.getElementById('adminKey2').value);
};

async function loadList() {
  const el = document.getElementById('entries');
  try {
    const resp = await fetch('/api/list');
    const data = await resp.json();
    if (!data.length) { el.textContent = 'No entries yet.'; return; }
    el.innerHTML = data.map(e =>
      `<div class="entry"><b>${e.id}</b> — ${e.name || ''} (${e.domain || 'no domain'})</div>`
    ).join('');
  } catch (err) {
    el.textContent = 'Failed to load list.';
  }
}

loadList();
</script>

</body>
</html>
