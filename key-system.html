<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Generate Access Key</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#071226;
      --accent:#10b981;
      --banner:#f59e0b;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body {
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto;
      background:linear-gradient(180deg,#041024 0%, #071226 100%);
      color:#e6eef6;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{max-width:700px;width:100%;text-align:center;}
    .banner{
      background:var(--banner);
      color:#0b1220;
      padding:10px 14px;
      border-radius:10px;
      font-weight:600;
      display:inline-flex;
      gap:8px;
      align-items:center;
      box-shadow:0 6px 20px rgba(5,10,20,0.45);
    }
    .card{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:16px;
      padding:36px;
      margin-top:22px;
      box-shadow:0 20px 50px rgba(3,6,12,0.6);
    }
    .logo{
      width:60px;height:60px;border-radius:14px;
      background:linear-gradient(180deg,#0ea5a4,#10b981);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;color:#071226;font-weight:700;margin:0 auto 12px;
    }
    h1{margin:0;font-size:22px;}
    p{color:#9ca3af;margin:8px 0 20px;}
    button{
      background:var(--accent);
      color:#03121a;
      padding:14px 30px;
      border-radius:999px;
      border:0;
      font-weight:700;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 8px 30px rgba(16,185,129,0.14);
    }
    button:active{transform:translateY(1px)}
    .toast{
      margin-top:18px;
      display:none;
      background:rgba(16,185,129,0.1);
      border:1px solid rgba(16,185,129,0.25);
      padding:12px;
      border-radius:10px;
      color:#b7f5dc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <span style="width:10px;height:10px;background:#fff;border-radius:50%;display:inline-block"></span>
      Welcome! Click below to generate your key
    </div>

    <div class="card">
      <div class="logo">🔑</div>
      <h1>Generate Access Key</h1>
      <p>Click the button below to start verification and unlock the App Store.</p>
      <button id="server3">➤ Server 3</button>
      <div class="toast" id="toast">✅ Key generated — verification in progress...</div>
    </div>
  </div>

  <script>
    const GLOBAL_ACCESS_KEY = 'global_access_key';
    const VERIFICATION_TIMESTAMP_KEY = 'verification_timestamp';
    const KEY_DURATION_MS = 24 * 60 * 60 * 1000;
    const VERIFICATION_DELAY_MS = 70 * 1000;
    const VPLINK_URL = 'https://vplink.in/cL5x'; // ✅ your custom vplink
    const SECRET_PHRASE = "KeyVaultSecure24Hour!!@#$";

    function generateHash(ts){return btoa(ts + SECRET_PHRASE).substring(0,30);}
    function saveKey(obj){localStorage.setItem(GLOBAL_ACCESS_KEY, JSON.stringify(obj));}
    function setVerifyTime(t){localStorage.setItem(VERIFICATION_TIMESTAMP_KEY, String(t));}

    const btn=document.getElementById('server3');
    const toast=document.getElementById('toast');

    btn.addEventListener('click',()=>{
      const ts=Date.now();
      const hash=generateHash(ts);
      saveKey({timestamp:ts,validationHash:hash});
      const verifyEnd=ts+VERIFICATION_DELAY_MS;
      setVerifyTime(verifyEnd);

      // open your vplink
      window.open(VPLINK_URL,'_blank');

      // show status
      toast.style.display='block';
      btn.disabled=true;
      btn.textContent='Verifying...';

      // after timer, open your site
      setTimeout(()=>{
        window.location.href='/';
      },VERIFICATION_DELAY_MS);
    });
  </script>
</body>
</html>
